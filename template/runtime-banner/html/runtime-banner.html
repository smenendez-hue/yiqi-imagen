<!doctype html>
<html lang="es" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YiQi · Runtime banner template</title>
  <!-- Mismo loading de fuentes que el catálogo del DS -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@700;800&family=Inter:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <!-- DS local del repo. En producción: el CDN publicado -->
  <link rel="stylesheet" href="../../../styles.css">

  <style>
    /* ── Runtime banner refinado (aprobado · pendiente de promover al DS) ───
       Énfasis por FONDO TONAL (§3) — sin bordes de acento de un solo lado. */
    .runtime-banner{
      display:flex; align-items:center; justify-content:space-between; gap:24px;
      padding:18px 22px;
      border-radius:var(--radius-lg);
      border:1px solid transparent;
      background:var(--bg-elev);
      box-shadow:none;
    }
    .runtime-banner[data-state="mock"]{  background:var(--cyan-soft); }
    .runtime-banner[data-state="error"]{ background:var(--red-soft); }

    .runtime-banner .rb-content{ min-width:0; }

    /* kicker — IBM Plex Mono, mayúsculas, tracking */
    .runtime-banner .rb-kicker{
      display:inline-flex; align-items:center; gap:8px; margin:0 0 7px;
      font:700 10px var(--mono); letter-spacing:.16em; text-transform:uppercase;
    }
    .runtime-banner .rb-dot{ width:6px; height:6px; border-radius:50%; flex-shrink:0; }
    .runtime-banner[data-state="mock"]  .rb-kicker{ color:var(--cyan); }
    .runtime-banner[data-state="mock"]  .rb-dot{ background:var(--cyan); }
    .runtime-banner[data-state="error"] .rb-kicker{ color:var(--red); }
    .runtime-banner[data-state="error"] .rb-dot{ background:var(--red); }

    /* título — Inter 600 (card heading, §2) */
    .runtime-banner .rb-title{
      margin:0; font:600 17px/1.3 var(--sans); letter-spacing:-.02em; color:var(--text);
    }
    /* descripción — Inter, interlineado compacto */
    .runtime-banner .rb-desc{
      margin:5px 0 0; max-width:56ch;
      font:400 13.5px/1.45 var(--sans); color:var(--muted);
    }
  </style>
</head>
<body>
  <main class="content" style="display:grid;gap:18px;max-width:760px">

    <!-- Datos de prueba (mock) -->
    <div class="runtime-banner" data-state="mock" role="status">
      <div class="rb-content">
        <div class="rb-kicker"><span class="rb-dot"></span> Modo demo</div>
        <div class="rb-title">Datos de ejemplo activos</div>
        <p class="rb-desc">Esta vista usa información de demostración hasta conectar una fuente validada.</p>
      </div>
      <button class="btn btn-primary" type="button">Conectar</button>
    </div>

    <!-- Error de conexión -->
    <div class="runtime-banner" data-state="error" role="alert">
      <div class="rb-content">
        <div class="rb-kicker"><span class="rb-dot"></span> Sin conexión</div>
        <div class="rb-title">No se pudo cargar la información</div>
        <p class="rb-desc">Reintenta la consulta o revisa el estado de la integración.</p>
      </div>
      <button class="btn" type="button">Reintentar</button>
    </div>

  </main>
</body>
</html>
