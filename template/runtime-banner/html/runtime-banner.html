<!doctype html>
<html lang="es" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YiQi runtime banner template</title>
  <link rel="stylesheet" href="https://diguardia.github.io/yiqi-imagen/styles.css">
</head>
<body>
  <main class="content">
    <div class="runtime-banner" data-state="mock" role="status">
      <strong>Datos de ejemplo</strong>
      <p>Esta vista usa informacion demo hasta conectar una fuente validada.</p>
    </div>

    <div class="runtime-banner" data-state="error" role="alert">
      <strong>No se pudo cargar la informacion</strong>
      <p>Reintenta la consulta o revisa el estado de la integracion.</p>
    </div>
  </main>
</body>
</html>
