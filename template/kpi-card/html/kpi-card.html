<!doctype html>
<html lang="es" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YiQi KPI card template</title>
  <link rel="stylesheet" href="https://diguardia.github.io/yiqi-imagen/styles.css">
</head>
<body>
  <main class="content">
    <section class="kpi-grid" aria-label="Indicadores">
      <article class="kpi-card">
        <span class="kpi-label">Ventas</span>
        <strong class="kpi-value">$ 128.400</strong>
        <span class="kpi-delta is-positive">+12%</span>
      </article>

      <article class="kpi-card">
        <span class="kpi-label">Pedidos</span>
        <strong class="kpi-value">342</strong>
        <span class="kpi-delta is-neutral">Sin cambios</span>
      </article>

      <article class="kpi-card">
        <span class="kpi-label">Alertas</span>
        <strong class="kpi-value">7</strong>
        <span class="kpi-delta is-negative">Revisar</span>
      </article>
    </section>
  </main>
</body>
</html>
