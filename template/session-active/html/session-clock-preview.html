<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YiQi · Sesión activa — reloj analógico (propuesta)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eeece7; --surface:#f6f4ef; --line:rgba(16,36,54,.10);
      --text:#17191c; --muted:#6f6e73; --muted-2:#8a8a8e; --accent:#ff7a1a;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);font-family:'Inter',sans-serif;min-height:100vh;display:grid;place-items:center;padding:32px}

    .card{
      width:min(520px,100%); background:var(--surface);
      border:1px solid var(--line); border-radius:20px;
      padding:26px 30px;
      display:flex; align-items:center; gap:28px;
    }
    .kicker{ font:700 10px 'IBM Plex Mono',monospace; letter-spacing:.16em; text-transform:uppercase; color:var(--muted-2); margin:0 0 14px; }

    /* ── Reloj analógico (Braun / Rams · macOS) ─────────────── */
    .clock{ width:128px; height:128px; flex-shrink:0; }
    .clk-face{ fill:var(--surface); }
    .clk-tick-min{ stroke:var(--muted-2); stroke-width:1; opacity:.55; }
    .clk-tick-hr{ stroke:var(--text); stroke-width:2.4; stroke-linecap:round; }
    .clk-hand{ stroke:var(--text); stroke-linecap:round; transform-origin:100px 100px; }
    .clk-hour{ stroke-width:6.5; }
    .clk-min{ stroke-width:4.5; }
    .clk-sec-g{ transform-origin:100px 100px; transition:transform .18s cubic-bezier(.34,1.56,.64,1); }
    .clk-sec{ stroke:var(--accent); stroke-width:2; stroke-linecap:round; }
    .clk-sec-dot{ fill:var(--accent); }
    .clk-cap{ fill:var(--text); }
    .clk-cap-dot{ fill:var(--accent); }

    .meta{ min-width:0; }
    .day{ font:700 24px 'Plus Jakarta Sans','Inter',sans-serif; letter-spacing:-.02em; color:var(--text); line-height:1.1; }
    .date{ font:500 13px 'IBM Plex Mono',monospace; color:var(--muted); margin-top:6px; }
    .time{ font:600 12px 'IBM Plex Mono',monospace; color:var(--muted-2); margin-top:12px; letter-spacing:.02em; }
  </style>
</head>
<body>
  <div class="card">
    <div>
      <p class="kicker">Sesión activa</p>
      <svg class="clock" viewBox="0 0 200 200" role="img" aria-label="Reloj analógico">
        <circle class="clk-face" cx="100" cy="100" r="96"></circle>
        <g id="ticks"></g>
        <line class="clk-hand clk-hour" id="hHour" x1="100" y1="112" x2="100" y2="60"></line>
        <line class="clk-hand clk-min" id="hMin" x1="100" y1="115" x2="100" y2="42"></line>
        <g class="clk-sec-g" id="hSecG">
          <line class="clk-sec" x1="100" y1="120" x2="100" y2="46"></line>
          <circle class="clk-sec-dot" cx="100" cy="58" r="4.5"></circle>
        </g>
        <circle class="clk-cap" cx="100" cy="100" r="4.6"></circle>
        <circle class="clk-cap-dot" cx="100" cy="100" r="1.8"></circle>
      </svg>
    </div>
    <div class="meta">
      <div class="day" id="day">Lunes</div>
      <div class="date" id="date">15 de junio</div>
      <div class="time" id="time">08:42</div>
    </div>
  </div>

  <script>
    (function(){
      // marcas: 60 finas + 12 de hora
      var ticks=document.getElementById('ticks');
      for(var i=0;i<60;i++){
        var a=i*6*Math.PI/180, hr=(i%5===0);
        var r1=hr?78:84, r2=90;
        var x1=100+r1*Math.sin(a), y1=100-r1*Math.cos(a);
        var x2=100+r2*Math.sin(a), y2=100-r2*Math.cos(a);
        var ln=document.createElementNS('http://www.w3.org/2000/svg','line');
        ln.setAttribute('x1',x1.toFixed(2));ln.setAttribute('y1',y1.toFixed(2));
        ln.setAttribute('x2',x2.toFixed(2));ln.setAttribute('y2',y2.toFixed(2));
        ln.setAttribute('class',hr?'clk-tick-hr':'clk-tick-min');
        ticks.appendChild(ln);
      }
      var H=document.getElementById('hHour'), M=document.getElementById('hMin'), S=document.getElementById('hSecG');
      var dayEl=document.getElementById('day'), dateEl=document.getElementById('date'), timeEl=document.getElementById('time');
      var DIAS=['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
      var MES=['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
      function tick(){
        var d=new Date();
        var s=d.getSeconds(), m=d.getMinutes(), h=d.getHours();
        S.style.transform='rotate('+(s*6)+'deg)';
        M.style.transform='rotate('+(m*6+s*0.1)+'deg)';
        H.style.transform='rotate('+((h%12)*30+m*0.5)+'deg)';
        dayEl.textContent=DIAS[d.getDay()];
        dateEl.textContent=d.getDate()+' de '+MES[d.getMonth()];
        timeEl.textContent=String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
      }
      tick(); setInterval(tick,1000);
    })();
  </script>
</body>
</html>
