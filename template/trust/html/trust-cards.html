<!doctype html>
<html lang="es" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YiQi trust cards template</title>
  <!-- DS local del repo (refleja los cambios al instante). En producción: el CDN publicado -->
  <link rel="stylesheet" href="../../../styles.css">
  <!-- Producción: <link rel="stylesheet" href="https://diguardia.github.io/yiqi-imagen/styles.css"> -->
</head>
<body>
  <main class="content">
    <div class="trust trust--cards">
      <div class="trust-item">
        <strong class="trust-num">128</strong>
        <span class="trust-label">Procesos</span>
        <span class="trust-delta is-up">+12 este mes</span>
      </div>
      <div class="trust-item">
        <strong class="trust-num">4.8</strong>
        <span class="trust-label">Satisfacción</span>
        <span class="trust-delta is-flat">Estable</span>
      </div>
    </div>
  </main>
</body>
</html>
