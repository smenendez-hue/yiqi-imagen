<!doctype html>
<html lang="es" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YiQi trust grid template</title>
  <!-- DS local del repo (refleja los cambios al instante). En producción: el CDN publicado -->
  <link rel="stylesheet" href="../../../styles.css">
  <!-- Producción: <link rel="stylesheet" href="https://diguardia.github.io/yiqi-imagen/styles.css"> -->
</head>
<body>
  <main class="content">
    <div class="trust trust--grid trust--sm">
      <div class="trust-item">
        <strong class="trust-num">12</strong>
        <span class="trust-label">Sucursales</span>
      </div>
      <div class="trust-item">
        <strong class="trust-num">86</strong>
        <span class="trust-label">Usuarios</span>
      </div>
      <div class="trust-item">
        <strong class="trust-num">31k</strong>
        <span class="trust-label">Eventos</span>
      </div>
      <div class="trust-item">
        <strong class="trust-num">99%</strong>
        <span class="trust-label">Uptime</span>
      </div>
    </div>
  </main>
</body>
</html>
