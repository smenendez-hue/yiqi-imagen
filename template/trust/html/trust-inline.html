<!doctype html>
<html lang="es" data-theme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>YiQi trust inline template</title>
  <!-- DS local del repo (refleja los cambios al instante). En producción: el CDN publicado -->
  <link rel="stylesheet" href="../../../styles.css">
  <!-- Producción: <link rel="stylesheet" href="https://diguardia.github.io/yiqi-imagen/styles.css"> -->
</head>
<body>
  <main class="content">
    <div class="trust trust--inline trust--lg">
      <div class="trust-item">
        <strong class="trust-num">24<span class="trust-unit">/7</span></strong>
        <span class="trust-label">Operación</span>
      </div>
      <div class="trust-item">
        <strong class="trust-num">+18<span class="trust-unit">%</span></strong>
        <span class="trust-label">Eficiencia</span>
      </div>
      <div class="trust-item">
        <strong class="trust-num">99<span class="trust-unit">%</span></strong>
        <span class="trust-label">Disponibilidad</span>
      </div>
    </div>
  </main>
</body>
</html>
