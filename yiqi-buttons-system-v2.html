<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YiQi Button System v2</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0a0b;
  --text:#f3f5f7;
  --muted:#98a2b3;
  --cyan:#00ccff;
  --green:#15d49c;
  --red:#ff637d;
  --amber:#ffb020;
  --mono:'IBM Plex Mono', monospace;
  --sans:'Inter', sans-serif;
}
body{
  margin:0;
  background:var(--bg);
  color:var(--text);
  font-family:var(--sans);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
}

.wrap{
  display:flex;
  flex-direction:column;
  gap:16px;
}

/* BASE */
.yiqi-btn{
  display:inline-flex;
  align-items:center;
  gap:10px;
  padding:14px 20px;
  border-radius:14px;
  font-weight:700;
  font-size:14px;
  text-decoration:none;
  transition:all .2s ease;
  border:1px solid transparent;
}

/* PRIMARY */
.yiqi-btn-primary{
  background:linear-gradient(180deg, #00ccff, #00aee0);
  color:#001018;
}
.yiqi-btn-primary:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 10px 30px rgba(0,204,255,.25);
}

/* AMBER (NEW 🔥) */
.yiqi-btn-amber{
  background:linear-gradient(180deg, #ffb020, #d89200);
  color:#1a1200;
}
.yiqi-btn-amber:hover{
  transform:translateY(-2px) scale(1.02);
  box-shadow:0 10px 30px rgba(255,176,32,.28);
}

/* GHOST */
.yiqi-btn-ghost{
  background:rgba(255,255,255,.02);
  border:1px solid rgba(255,255,255,.1);
  color:var(--text);
}
.yiqi-btn-ghost:hover{
  background:rgba(255,255,255,.05);
}

/* SUCCESS */
.yiqi-btn-success{
  background:rgba(21,212,156,.1);
  border:1px solid rgba(21,212,156,.3);
  color:var(--green);
}
.yiqi-btn-success:hover{
  box-shadow:0 10px 25px rgba(21,212,156,.2);
}

/* DANGER */
.yiqi-btn-danger{
  background:rgba(255,99,125,.1);
  border:1px solid rgba(255,99,125,.3);
  color:var(--red);
}
.yiqi-btn-danger:hover{
  box-shadow:0 10px 25px rgba(255,99,125,.2);
}

/* LOADING */
.yiqi-btn-loading{
  pointer-events:none;
  opacity:.7;
}
.spinner{
  width:14px;
  height:14px;
  border:2px solid rgba(0,0,0,.2);
  border-top:2px solid #001018;
  border-radius:50%;
  animation:spin .6s linear infinite;
}
@keyframes spin{
  to{transform:rotate(360deg);}
}
</style>
</head>
<body>

<div class="wrap">

<a href="#" class="yiqi-btn yiqi-btn-primary">
  Primary
</a>

<a href="#" class="yiqi-btn yiqi-btn-amber">
  Login (Ámbar)
</a>

<a href="#" class="yiqi-btn yiqi-btn-ghost">
  Ghost
</a>

<a href="#" class="yiqi-btn yiqi-btn-success">
  Success
</a>

<a href="#" class="yiqi-btn yiqi-btn-danger">
  Danger
</a>

<a href="#" class="yiqi-btn yiqi-btn-primary yiqi-btn-loading">
  <span class="spinner"></span>
  Loading
</a>

</div>

</body>
</html>
